<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bakery Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- OVERLAY -->
<div class="overlay" id="overlay"></div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <h2>🌸 Menu</h2>
  <ul>
    <li onclick="goTo('index.html')">🏠 Home</li>
    <li onclick="goTo('dashboard.html')">📊 Dashboard</li>
    <li onclick="goTo('account.html')">👤 Account</li>
  </ul>
</div>

<div class="app">

  <!-- TOPBAR -->
  <div class="topbar">
    <span class="menu-btn" id="menuBtn">☰</span>
    <div class="center-title">🍰 Bakery Shelf</div>
  </div>

  <!-- DASHBOARD -->
  <div class="dashboard-container">


    <!-- GLASS CASE -->
    <div class="glass-case">
      <div class="shelf-row" id="topShelf"></div>
      <div class="shelf-row" id="middleShelf"></div>
      <div class="shelf-row" id="bottomShelf"></div>
    </div>

  </div>
  <div class="weekly-section">
  <h3>📊 Weekly Progress</h3>

  <div class="chart" id="weeklyChart"></div>
</div>

</div>

<script src="dashboard.js"></script>
<script src="script.js"></script>

</body>
</html>
